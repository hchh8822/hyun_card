<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>현창호 · HYUN 자산 경영 전략실</title>
  <meta name="description" content="현창호 — HYUN 자산 경영 전략실. 자산은 사는 것이 아니라, 경영되는 대상입니다.">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="card" id="card">

    <!-- ─── Zone 1: Brand mark ─── -->
    <header class="c-brand">
      <svg class="c-mark" width="26" height="26" viewBox="0 0 52 52" fill="none"
           xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <line x1="4"  y1="44" x2="48" y2="44" stroke="currentColor" stroke-width="3.2" stroke-linecap="square"/>
        <line x1="15" y1="32" x2="48" y2="32" stroke="currentColor" stroke-width="3.2" stroke-linecap="square"/>
        <line x1="26" y1="20" x2="48" y2="20" stroke="currentColor" stroke-width="3.2" stroke-linecap="square"/>
        <line x1="37" y1="8"  x2="48" y2="8"  stroke="currentColor" stroke-width="3.2" stroke-linecap="square"/>
        <line x1="2"  y1="50" x2="50" y2="2"  stroke="currentColor" stroke-width="2"   stroke-linecap="square" opacity="0.4"/>
      </svg>
      <span class="c-wordmark">HYUN</span>
    </header>

    <!-- ─── Zone 2: Identity ─── -->
    <section class="c-identity" aria-label="인물 정보">
      <h1 class="c-name-ko">현창호</h1>
      <p class="c-name-en">Changho Hyun</p>
      <p class="c-brand-name">
        <span lang="ko">자산 경영 전략실</span>
        <span class="c-dot" aria-hidden="true">·</span>
        <span lang="en">Asset Management Strategy Office</span>
      </p>
    </section>

    <!-- ─── Zone 3: Philosophy ─── -->
    <section class="c-philosophy" aria-label="경영 철학">
      <hr class="c-rule" aria-hidden="true">
      <blockquote class="c-statement" lang="ko" cite="">
        <p>자산은 사는 것이 아니라,</p>
        <p>경영되는 대상입니다.</p>
      </blockquote>
      <hr class="c-rule" aria-hidden="true">
    </section>

    <!-- ─── Zone 4–5: Actions ─── -->
    <footer class="c-actions">

      <!-- Primary: website -->
      <!-- REPLACE: change href to your actual website URL -->
      <a class="c-enter" href="REPLACE_WITH_YOUR_WEBSITE_URL" id="btnEnter">
        <span>Enter</span>
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" aria-hidden="true">
          <line x1="2"  y1="7.5" x2="13" y2="7.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="square"/>
          <polyline points="9,3.5 13,7.5 9,11.5" fill="none" stroke="currentColor"
                    stroke-width="1.5" stroke-linecap="square" stroke-linejoin="miter"/>
        </svg>
      </a>

      <!-- Secondary: QR -->
      <div class="c-qr-row">
        <div class="c-qr-frame">
          <!--
            REPLACE: change "REPLACE_WITH_YOUR_WEBSITE_URL" in the src URL below
            to your actual website URL (URL-encode special characters if needed).
            Example: data=https%3A%2F%2Fhyun.co.kr
          -->
          <img
            src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=REPLACE_WITH_YOUR_WEBSITE_URL&bgcolor=F8F7F5&color=1A1A24&qzone=2&format=svg"
            alt="HYUN 자산 경영 전략실 공식 웹사이트"
            width="64"
            height="64"
            loading="lazy"
            decoding="async"
          >
        </div>
        <p class="c-qr-caption">Asset Management Strategy</p>
      </div>

      <!-- Tertiary: contacts -->
      <!-- REPLACE: update tel: and mailto: values below -->
      <nav class="c-contacts" aria-label="연락처">
        <a href="tel:REPLACE_WITH_PHONE" class="c-contact">
          <span class="ko">전화</span><span class="en">Call</span>
        </a>
        <span class="c-contact-sep" aria-hidden="true">·</span>
        <a href="mailto:REPLACE_WITH_EMAIL" class="c-contact">
          <span class="ko">이메일</span><span class="en">Email</span>
        </a>
      </nav>

    </footer>
  </main>

  <script src="main.js"></script>
</body>
</html>
